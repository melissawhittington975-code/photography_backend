{% extends "bookings/base.html" %}
{% load static %}

{% block title %}
{{ photo.title }} | Who Cares Photography
{% endblock %}

{% block content %}

<section class="gallery-page">

    <div class="section-header">
        <span class="hero-subtitle">
            Gallery
        </span>

        <h1>{{ photo.title }}</h1>

        <p>{{ photo.category }}</p>
    </div>

    <div style="max-width:1000px; margin:40px auto; text-align:center;">

        <img
            src="{{ photo.image.url }}"
            alt="{{ photo.title }}"
            style="
                width:100%;
                max-width:900px;
                border-radius:12px;
                box-shadow:0 15px 40px rgba(0,0,0,.4);
            ">

        <br><br>

        <a href="{% url 'gallery' %}"
           style="
                display:inline-block;
                padding:12px 28px;
                background:#d4af37;
                color:#000;
                text-decoration:none;
                border-radius:8px;
                font-weight:bold;
           ">
            ← Back to Gallery
        </a>

    </div>

</section>

{% endblock %}
